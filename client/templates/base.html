<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RateRace</title>
  <link rel="stylesheet" href="../static/css/output.css" />
  <!-- {% block extra_head %}{% endblock %} -->
</head>
<body class="min-h-screen bg-zinc-950 text-amber-50 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-black border-b-2 border-amber-400 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">

      <!-- Logo -->
      <a href="/" class="flex items-center gap-2 group">
        <span class="text-amber-400 text-xl">★</span>
        <span class="text-xl font-extrabold uppercase tracking-widest text-amber-50 group-hover:text-amber-400 transition">
          Rate<span class="text-amber-400 group-hover:text-amber-50 transition">Race</span>
        </span>
      </a>

      <!-- Nav links -->
      <div class="flex items-center gap-6 text-xs font-bold uppercase tracking-widest">
        <a href="/game" class="text-zinc-400 hover:text-amber-400 transition">Play</a>
        <a href="/scoreboard" class="text-zinc-400 hover:text-amber-400 transition">Leaderboard</a>

        <!-- Logged out state -->
        <div class="flex items-center gap-3">
          <a href="/login" class="text-zinc-400 hover:text-amber-400 transition">Log In</a>
          <a href="/register" class="bg-amber-400 text-black px-5 py-2 font-extrabold uppercase tracking-widest text-xs hover:bg-amber-300 transition border-b-2 border-amber-600">
            Sign Up
          </a>
        </div>

        <!-- Logged in state (hidden by default, toggled via JS) -->
        <div id="user-menu" class="hidden items-center gap-3">
          <span id="username-display" class="text-zinc-400 text-xs"></span>
          <a href="/logout" class="text-zinc-500 hover:text-amber-400 transition">Log Out</a>
        </div>
      </div>

    </div>
  </nav>

  <!-- Flash messages -->
  <!--
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="max-w-6xl mx-auto w-full px-6 pt-4">
        {% for category, message in messages %}
          <div class="mb-2 px-4 py-3 text-xs font-bold uppercase tracking-widest
            {% if category == 'error' %}bg-red-950 text-red-300 border border-red-700
            {% elif category == 'success' %}bg-green-950 text-green-300 border border-green-700
            {% else %}bg-zinc-900 text-amber-300 border border-amber-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  -->

  <!-- Main content -->
  <main class="flex-1">
    <!-- {% block content %}{% endblock %} -->
  </main>

  <!-- Footer -->
  <footer class="bg-black border-t-2 border-amber-400 py-6 text-center text-xs text-zinc-500 uppercase tracking-widest">
    <p>★ RateRace &mdash; CITS3403 Project &mdash; 2025 ★</p>
  </footer>

  <!-- {% block extra_scripts %}{% endblock %} -->
</body>
</html>
